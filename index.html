<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

      margin: 0;

    .container {

      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 0;
    }

    .header p {
      font-size: 1.2rem;
      font-weight: 300;
      margin-top: 0;
    }

    .main {
      margin-top: 2rem;
    }

    .main h2 {
      font-size: 1.6rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .main p {
      font-size: 1.2rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
    }

    .footer p {
      font-size: 1rem;
      font-weight: 300;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>[Your Name]</h1>
      <p>Your tagline or description</p>
    </header>

    <main class="main">
      [Your content goes here]
    </main>

    <footer class="footer">

    </footer>
